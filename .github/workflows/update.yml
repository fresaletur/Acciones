name: Actualizar cotizaciones
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch datos
        run: python3 fetch_stocks.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.json
          git diff --staged --quiet || git commit -m "update: stock data"
          git push
